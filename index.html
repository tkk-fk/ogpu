<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>音符の名前フラッシュカード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Music&family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbf5f4; --card:#ffffff; --ink:#3a3436; --sub:#8b7f81;
    --red:#e0574c; --red-d:#c0392b; --red-soft:#fde3df; --line:#eeddda;
    --shadow:0 10px 30px rgba(192,57,43,.12);
    font-family:'Zen Maru Gothic','M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--ink);display:flex;justify-content:center;
       align-items:flex-start;min-height:100dvh;padding:16px;}
  .app{width:100%;max-width:460px;}
  .screen{display:none;animation:fade .25s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .mus{font-family:'Noto Music',"Segoe UI Symbol","Apple Symbols",sans-serif;line-height:1;color:var(--ink);}
  .dyn{font-family:Georgia,'Times New Roman',serif;font-style:italic;font-weight:bold;color:var(--ink);}

  .head{text-align:center;margin:6px 0 18px;}
  .head .badge{display:inline-flex;align-items:center;gap:8px;background:var(--red-soft);
       color:var(--red-d);padding:6px 14px;border-radius:999px;font-weight:700;font-size:13px;}
  h1{font-size:25px;margin:12px 0 4px;font-weight:900;}
  .head p{margin:0;color:var(--sub);font-size:14px;font-weight:500;}

  .panel{background:var(--card);border-radius:22px;padding:20px 18px;box-shadow:var(--shadow);margin-bottom:16px;}
  .label{font-size:15px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .label .dot{width:10px;height:10px;border-radius:50%;background:var(--red);}
  .label .cnt{margin-left:auto;font-size:12px;color:var(--sub);font-weight:600;}

  .cats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .cat{position:relative;border:2.5px solid var(--line);background:#fff;border-radius:16px;
       padding:14px 6px 12px;text-align:center;cursor:pointer;transition:.15s;
       display:flex;flex-direction:column;align-items:center;gap:6px;user-select:none;}
  .cat .ci{height:46px;display:flex;align-items:center;justify-content:center;font-size:40px;}
  .cat .cn{font-weight:700;font-size:15px;}
  .cat .ck{font-size:11px;color:var(--sub);font-weight:500;}
  .cat.on{border-color:var(--red);background:var(--red-soft);}
  .cat.on .cn{color:var(--red-d);}
  .cat .check{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;
       background:var(--red);color:#fff;display:none;align-items:center;justify-content:center;font-size:13px;}
  .cat.on .check{display:flex;}

  .counts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .count{border:2.5px solid var(--line);background:#fff;border-radius:16px;padding:16px 6px;
       text-align:center;cursor:pointer;transition:.15s;font-weight:700;font-size:17px;user-select:none;}
  .count small{display:block;font-size:11px;color:var(--sub);font-weight:500;margin-top:2px;}
  .count.on{border-color:var(--red);background:var(--red-soft);color:var(--red-d);}

  details.list{background:var(--card);border-radius:22px;box-shadow:var(--shadow);margin-bottom:16px;padding:4px 2px;}
  details.list>summary{list-style:none;cursor:pointer;padding:18px;font-weight:700;font-size:15px;
       display:flex;align-items:center;justify-content:space-between;}
  details.list>summary::-webkit-details-marker{display:none;}
  details.list>summary .chev{transition:.2s;color:var(--sub);}
  details.list[open]>summary .chev{transform:rotate(180deg);}
  .listbody{padding:0 16px 18px;}
  .listcat{font-weight:700;color:var(--red-d);font-size:14px;margin:16px 0 8px;
       padding-bottom:4px;border-bottom:2px dotted var(--line);}
  .listgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:8px;}
  .li{background:#fdf7f6;border:1px solid var(--line);border-radius:12px;padding:10px 4px;
       display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
  .li .lg{height:40px;display:flex;align-items:center;justify-content:center;font-size:32px;line-height:1;}
  .li .lg svg{height:34px;width:auto;max-width:76px;}
  .li .lg .dyn{font-size:30px;}
  .li .ln{font-size:11px;font-weight:700;color:var(--ink);line-height:1.2;}
  .li .lm{font-size:10px;color:var(--sub);line-height:1.2;}

  .start{width:100%;border:none;border-radius:18px;padding:20px;background:var(--red);color:#fff;
       font-size:20px;font-weight:800;cursor:pointer;font-family:inherit;
       box-shadow:0 8px 20px rgba(224,87,76,.35);transition:.15s;letter-spacing:.04em;}
  .start:active{transform:translateY(2px);box-shadow:0 4px 12px rgba(224,87,76,.35);}
  .warn{text-align:center;color:var(--red-d);font-size:13px;font-weight:700;margin:10px 0 0;height:16px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .back{display:inline-flex;align-items:center;gap:6px;border:none;background:#fff;color:var(--ink);
       font-weight:700;font-size:15px;padding:10px 16px;border-radius:999px;cursor:pointer;
       font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .back:active{transform:scale(.97);}
  .prog{font-weight:700;color:var(--sub);font-size:15px;}
  .prog b{color:var(--red-d);font-size:19px;}
  .bar{height:8px;background:#f0e2df;border-radius:999px;overflow:hidden;margin-bottom:16px;}
  .bar>i{display:block;height:100%;background:var(--red);border-radius:999px;transition:width .3s ease;}

  .flash{background:var(--card);border-radius:26px;box-shadow:var(--shadow);padding:24px;
       cursor:pointer;user-select:none;text-align:center;min-height:62dvh;display:flex;flex-direction:column;}
  .glyph{flex:1;display:flex;align-items:center;justify-content:center;min-height:180px;}
  .glyph .mus{font-size:clamp(96px,30vw,150px);}
  .glyph .dyn{font-size:clamp(64px,20vw,112px);}
  .glyph svg{width:min(64vw,260px);height:auto;max-height:34dvh;}
  .answer{opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;}
  .flash.revealed .answer{opacity:1;transform:none;}
  .yomi{color:var(--sub);font-size:16px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;min-height:20px;}
  .name{font-size:30px;font-weight:900;color:var(--ink);}
  .mean{display:inline-block;margin-top:14px;background:var(--red-soft);color:var(--red-d);
       padding:8px 18px;border-radius:999px;font-weight:700;font-size:15px;}
  .hint{margin-top:18px;color:var(--sub);font-weight:700;font-size:15px;min-height:20px;
       display:flex;align-items:center;justify-content:center;gap:8px;}
  .hint .tap{display:inline-flex;width:26px;height:26px;border-radius:50%;background:var(--red-soft);
       color:var(--red-d);align-items:center;justify-content:center;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}

  .done{background:var(--card);border-radius:26px;box-shadow:var(--shadow);padding:40px 24px;text-align:center;margin-top:20px;}
  .done .big{font-size:64px;margin-bottom:8px;}
  .done h2{font-size:26px;margin:0 0 6px;font-weight:900;}
  .done p{color:var(--sub);margin:0 0 24px;font-weight:500;}
  .done .btns{display:flex;flex-direction:column;gap:12px;}
  .done button{border:none;border-radius:16px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;}
  .again{background:var(--red);color:#fff;box-shadow:0 6px 16px rgba(224,87,76,.3);}
  .toset{background:#fff;color:var(--ink);border:2.5px solid var(--line);}
  .again:active,.toset:active{transform:translateY(2px);}
</style>
</head>
<body>
<div class="app">
  <section id="settings" class="screen active">
    <div class="head">
      <span class="badge">♪ おんがく</span>
      <h1>音符の名前フラッシュカード</h1>
      <p>おぼえたいものをえらんで、スタート！</p>
    </div>
    <div class="panel">
      <p class="label"><span class="dot"></span>なにをおぼえる？</p>
      <div class="cats" id="cats">
        <div class="cat on" data-cat="note"><span class="check">✓</span><div class="ci mus" data-ico="note"></div><div class="cn">音符</div><div class="ck">おんぷ</div></div>
        <div class="cat on" data-cat="rest"><span class="check">✓</span><div class="ci mus" data-ico="rest"></div><div class="cn">休符</div><div class="ck">きゅうふ</div></div>
        <div class="cat on" data-cat="mark"><span class="check">✓</span><div class="ci mus" data-ico="mark"></div><div class="cn">記号</div><div class="ck">きごう</div></div>
      </div>
    </div>
    <div class="panel">
      <p class="label"><span class="dot"></span>もんだいのかず</p>
      <div class="counts" id="counts">
        <div class="count" data-count="5">5<small>もん</small></div>
        <div class="count on" data-count="10">10<small>もん</small></div>
        <div class="count" data-count="all">ぜんぶ<small>ぜんもん</small></div>
      </div>
    </div>
    <details class="list">
      <summary>カードのいちらんを みる <span class="chev">▼</span></summary>
      <div class="listbody" id="listbody"></div>
    </details>
    <button class="start" id="start">スタート ▶</button>
    <p class="warn" id="warn"></p>
  </section>

  <section id="card" class="screen">
    <div class="topbar">
      <button class="back" id="back">← もどる</button>
      <span class="prog"><b id="pnow">1</b> / <span id="ptot">10</span></span>
    </div>
    <div class="bar"><i id="fill"></i></div>
    <div class="flash" id="flash">
      <div class="glyph" id="glyph"></div>
      <div class="answer">
        <div class="yomi" id="yomi"></div>
        <div class="name" id="name"></div>
        <div class="mean" id="mean"></div>
      </div>
      <div class="hint" id="hint"></div>
    </div>
  </section>

  <section id="done" class="screen">
    <div class="done">
      <div class="big">🎉</div>
      <h2>ぜんぶ できたね！</h2>
      <p id="donenum"></p>
      <div class="btns">
        <button class="again" id="again">もういちど</button>
        <button class="toset" id="toset">せっていにもどる</button>
      </div>
    </div>
  </section>
</div>

const fc = (...cps) => String.fromCodePoint(...cps);

// build the glyph HTML for an item
function glyphHTML(it){
  if(it.svg) return SVGMAP[it.svg] || "";
  if(it.txt) return `<span class="dyn">${it.txt}</span>`;
  return `<span class="mus">${fc(...it.cps)}${it.dot ? "." : ""}</span>`;
}

const CAT_LABEL = {note:"🎵 音符（おんぷ）", rest:"💤 休符（きゅうふ）", mark:"🎼 記号（きごう）"};
const CAT_ICON  = {note:0x2669, rest:0x1D13D, mark:0x1D11E};
const $ = id => document.getElementById(id);
let count = "10", deck = [], idx = 0, revealed = false;

document.querySelectorAll('[data-ico]').forEach(el=>{ el.textContent = fc(CAT_ICON[el.dataset.ico]); });

(function renderList(){
  let html = "";
  ["note","rest","mark"].forEach(cat=>{
    html += `<div class="listcat">${CAT_LABEL[cat]}</div><div class="listgrid">`;
    ITEMS.filter(i=>i.cat===cat).forEach(i=>{
      html += `<div class="li"><span class="lg">${glyphHTML(i)}</span><span class="ln">${i.name}</span><span class="lm">${i.mean}</span></div>`;
    });
    html += `</div>`;
  });
  $('listbody').innerHTML = html;
})();

$('cats').addEventListener('click', e=>{
  const c = e.target.closest('.cat'); if(!c) return;
  c.classList.toggle('on'); $('warn').textContent="";
});
$('counts').addEventListener('click', e=>{
  const c = e.target.closest('.count'); if(!c) return;
  document.querySelectorAll('.count').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); count = c.dataset.count;
});

const selectedCats = () => [...document.querySelectorAll('.cat.on')].map(c=>c.dataset.cat);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDeck(pool,n){
  let d=[];
  while(d.length<n){
    let s=shuffle([...pool]);
    if(d.length && s[0]===d[d.length-1] && s.length>1){[s[0],s[1]]=[s[1],s[0]];}
    d=d.concat(s);
  }
  return d.slice(0,n);
}
const show = scr => {document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(scr).classList.add('active');};

$('start').addEventListener('click', ()=>{
  const cats = selectedCats();
  if(cats.length===0){ $('warn').textContent="ひとつ いじょう えらんでね"; return; }
  const pool = ITEMS.filter(it=>cats.includes(it.cat));
  const n = count==="all" ? pool.length : parseInt(count);
  deck = buildDeck(pool, n);
  idx = 0; $('ptot').textContent = deck.length;
  show('card'); render();
});

function render(){
  revealed = false;
  const it = deck[idx];
  $('flash').classList.remove('revealed');
  $('glyph').innerHTML = glyphHTML(it);
  $('yomi').textContent = it.yomi;
  $('name').textContent = it.name;
  $('mean').textContent = it.mean;
  $('pnow').textContent = idx+1;
  $('fill').style.width = (idx/deck.length*100)+"%";
  $('hint').innerHTML = `<span class="tap">✋</span> タップで こたえ`;
}

$('flash').addEventListener('click', ()=>{
  if(!revealed){
    revealed = true;
    $('flash').classList.add('revealed');
    $('fill').style.width = ((idx+1)/deck.length*100)+"%";
    const last = idx === deck.length-1;
    $('hint').innerHTML = last ? `<span class="tap">✋</span> タップで おわり`
                               : `<span class="tap">✋</span> タップで つぎ →`;
  } else {
    idx++;
    if(idx >= deck.length) finish();
    else render();
  }
});

$('back').addEventListener('click', ()=> show('settings'));
function finish(){ $('donenum').textContent = `${deck.length}もん クリア！`; show('done'); }
$('again').addEventListener('click', ()=>{ idx=0; deck=shuffle(deck); $('ptot').textContent=deck.length; show('card'); render(); });
$('toset').addEventListener('click', ()=> show('settings'));
</script>
